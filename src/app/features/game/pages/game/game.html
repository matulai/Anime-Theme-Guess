<div class="game">
  <p class="game__text" [style.visibility]="isVideoVisible() ? '' : 'hidden'">
    {{ `${this.gameService.currentTrack()?.animeName} (${this.gameService.currentTrack()?.slug})` }}
  </p>
  <div class="game__video-container">
    <div
      class="game__video-container__player"
      [class.hidden]="!(isVideoVisible() && willBePlayedVideo1())"
    >
      <video #videoPlayer1 preload="auto"></video>
    </div>
    <div
      class="game__video-container__player"
      [class.hidden]="!(isVideoVisible() && !willBePlayedVideo1())"
    >
      <video #videoPlayer2 preload="auto"></video>
    </div>
    <div class="video-overlay" [class.hidden]="isVideoVisible()"></div>
    <app-screen-timer
      [seconds]="3"
      [running]="isLoadingNextTrack()"
      (finished)="onLoadingNextTrackEnded()"
    />
    <app-progress-bar
      [seconds]="timerSeconds()"
      [running]="timerRunning()"
      (finished)="onGuessTimeEnded()"
    />
  </div>
  <div class="game__button-menu-container">
    <app-button [onClick]="() => this.navigateTo('/')" ]>MENU</app-button>
  </div>
  <div class="game__button-next-container">
    @if (isVideoVisible()) {
      <app-button [onClick]="() => this.onNextOrEndedVideo()" ]>NEXT</app-button>
    }
    <p class="game__count">
      {{ currentTracks() }}
    </p>
  </div>
</div>
